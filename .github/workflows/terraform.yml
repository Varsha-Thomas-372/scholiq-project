name: Terraform

on:
  push:
    branches: [ main, develop ]
    paths: [ 'infra/terraform/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'infra/terraform/**' ]
  workflow_dispatch:

env:
  TF_VERSION: '1.9.5'
  TF_DIR: 'infra/terraform'

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Terraform Init
      run: cd ${{ env.TF_DIR }} && terraform init -backend=false

    - name: Terraform Format
      run: cd ${{ env.TF_DIR }} && terraform fmt -check

    - name: Terraform Validate
      run: cd ${{ env.TF_DIR }} && terraform validate

    - name: Terraform Plan
      id: plan
      run: cd ${{ env.TF_DIR }} && terraform plan -var-file=terraform.tfvars.example -input=false -out=tfplan
      env:
        TF_VAR_sql_admin_login: ${{ secrets.TF_VAR_sql_admin_login }}
        TF_VAR_sql_admin_password: ${{ secrets.TF_VAR_sql_admin_password }}

    - name: Upload Plan
      uses: actions/upload-artifact@v4
      with:
        name: tfplan
        path: ${{ env.TF_DIR }}/tfplan

  apply:
    needs: plan
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Terraform Init
      run: cd ${{ env.TF_DIR }} && terraform init -backend=false

    - name: Download Plan
      uses: actions/download-artifact@v4
      with:
        name: tfplan

    - name: Terraform Apply
      run: cd ${{ env.TF_DIR }} && terraform apply tfplan
