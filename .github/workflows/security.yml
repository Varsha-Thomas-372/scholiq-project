
name: Security Scans

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write

jobs:
  codeql-sast:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: python, typescript

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
    # CodeQL scans Python (backend FastAPI) and TypeScript (frontend React) for vulnerabilities like SQLi, XSS, insecure deps.
    # Why: Static analysis catches issues early; integrates with GitHub Security tab for PR blocking.

  zap-dast:
    name: OWASP ZAP DAST
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Start containers
      run: docker compose up -d backend frontend

    - name: ZAP Scan
      uses: zaproxy/action-baseline@v0.7.0
      with:
        target: 'http://localhost:8000'
      # OWASP ZAP baseline DAST scans running app for OWASP Top 10 (XSS, injection, etc.).
      # Why: Dynamic testing validates runtime security; baseline is fast/non-aggressive for CI.

