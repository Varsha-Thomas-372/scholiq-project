name: CI/CD to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image
      run: docker build -t scholiq-backend ./backend

    - name: Tag image
      run: docker tag scholiq-backend ${{ secrets.DOCKER_USERNAME }}/scholiq-backend:latest

    - name: Push image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/scholiq-backend:latest

    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: scholiq-prod-api
        images: ${{ secrets.DOCKER_USERNAME }}/scholiq-backend:latest
