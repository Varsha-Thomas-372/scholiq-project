name: OWASP ZAP Baseline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 2"

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start frontend
        run: |
          cd frontend
          npm ci
          npm run dev -- --host 0.0.0.0 --port 5173 &
          npx wait-on http://127.0.0.1:5173

      - name: Baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://127.0.0.1:5173"
          cmd_options: "-a -j -m 5"
