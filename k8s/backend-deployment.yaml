apiVersion: apps/v1
kind: Deployment
metadata:
  name: scholiq-backend
  namespace: scholiq
  spec:
    # Review 2: Horizontal scaling via HPA (conceptual: kubectl autoscale deploy scholiq-backend --cpu-percent=70 --min=2 --max=10)
    replicas: 2
    selector:
      matchLabels:
        app: scholiq-backend
  template:
    metadata:
      labels:
        app: scholiq-backend
    spec:
      containers:
        - name: backend
          image: scholiqacr.azurecr.io/scholiq-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: scholiq-backend-secret
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
