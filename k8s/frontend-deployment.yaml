apiVersion: apps/v1
kind: Deployment
metadata:
  name: scholiq-frontend
  namespace: scholiq
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scholiq-frontend
  template:
    metadata:
      labels:
        app: scholiq-frontend
    spec:
      containers:
        - name: frontend
          image: scholiqacr.azurecr.io/scholiq-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
